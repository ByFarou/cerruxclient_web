<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CerruxClient - Minecraft Launcher</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Fuente estilo Minecraft -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Fondo animado -->
    <div class="background"></div>

    <!-- Contenido principal -->
    <div class="container">
        <!-- Tarjeta central -->
        <div class="card">
            <h1 class="title">CerruxClient</h1>
            <h2 class="subtitle">Beta 1.0</h2>
            <p class="hackhub">hackhub</p>
            
            <!-- Logo/Bandera -->
            <div class="logo-container">
                <img src="assets/icon.png" alt="Perú" class="logo">
            </div>
            
            <!-- Botón Download (deshabilitado por ahora) -->
            <button class="download-btn" disabled>
                <span class="btn-text">DOWNLOAD</span>
                <span class="btn-soon">Coming Soon</span>
            </button>
        </div>

        <!-- Texto de beta -->
        <div class="beta-notice">
            <p>*Esto es un beta x cierto así q puede q el cliente tenga algunos bugs</p>
            <p>*This is a beta btw so the client could experience some bugs</p>
        </div>

        <!-- Crédito -->
        <div class="credit">Made by: ByFarou</div>
    </div>

    <!-- Redes sociales (shortcuts) -->
    <div class="social-links">
        <a href="https://youtube.com/@ByFarou" target="_blank" class="social-btn youtube" title="YouTube">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
            </svg>
        </a>
        <a href="https://instagram.com/byfarou" target="_blank" class="social-btn instagram" title="Instagram">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4。
